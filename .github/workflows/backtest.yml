name: AI EA Backtest & Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC — weekly health check

jobs:
  backtest:
    name: Run Strategy Backtest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backtest — EUR/USD (2y)
        run: python backtest/run_backtest.py --symbol EURUSD=X --period 2y

      - name: Backtest — Gold XAU/USD (2y)
        run: python backtest/run_backtest.py --symbol GC=F --period 2y

      - name: Backtest — GBP/USD (2y)
        run: python backtest/run_backtest.py --symbol GBPUSD=X --period 2y

      - name: Backtest — USD/JPY (2y)
        run: python backtest/run_backtest.py --symbol USDJPY=X --period 2y

      - name: Save backtest results
        if: always()
        run: mkdir -p backtest/results && echo "completed" > backtest/results/status.txt

      - name: Upload backtest artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-results-${{ github.sha }}
          path: backtest/results/
          retention-days: 30

  lint:
    name: Validate MQL5 EA Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check EA file exists and has required sections
        run: |
          EA="EA/QuantCore_AI_EA.mq5"
          echo "Checking $EA..."
          grep -q "OnInit"             "$EA" && echo "✅ OnInit"
          grep -q "OnTick"             "$EA" && echo "✅ OnTick"
          grep -q "CalcLotSize"        "$EA" && echo "✅ CalcLotSize"
          grep -q "CheckPropLimits"    "$EA" && echo "✅ CheckPropLimits"
          grep -q "Inp_MaxDailyLoss"   "$EA" && echo "✅ MaxDailyLoss param"
          grep -q "Inp_MaxTotalLoss"   "$EA" && echo "✅ MaxTotalLoss param"
          grep -q "Inp_RiskPerTrade"   "$EA" && echo "✅ RiskPerTrade param"
          grep -q "ManageTrailingStop" "$EA" && echo "✅ TrailingStop"
          grep -q "UpdateKalmanOnTick" "$EA" && echo "✅ Kalman filter"
          grep -q "IsSessionOpen"      "$EA" && echo "✅ Session filter"
          grep -q "Inp_TradeAsia"      "$EA" && echo "✅ Asia session"
          grep -q "Inp_TradeLondon"    "$EA" && echo "✅ London session"
          grep -q "Inp_TradeNewYork"   "$EA" && echo "✅ NewYork session"
          grep -q "IsOverlapHour"      "$EA" && echo "✅ Overlap boost"
          echo "EA structure validation passed ✅"
